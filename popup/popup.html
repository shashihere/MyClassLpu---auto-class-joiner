<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoClassJoiner</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c0 1.1 2.7 3 6 3s6-1.9 6-3v-5"/>
        </svg>
      </div>
      <div>
        <h1>AutoClassJoiner</h1>
        <p class="subtitle">LPU MyClass · Auto Attendance</p>
      </div>
    </div>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text">
        <span class="status-label" id="statusLabel">Inactive</span>
        <span class="status-detail" id="statusDetail">Enter credentials to begin</span>
      </div>
    </div>

    <!-- Credentials Form -->
    <div class="form-section">
      <div class="input-group">
        <label for="regNumber">Registration Number</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="regNumber" placeholder="e.g., 12345678" autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" placeholder="Your UMS password">
          <button class="toggle-password" id="togglePassword" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Auto-Join Toggle -->
    <div class="toggle-section">
      <div class="toggle-info">
        <span class="toggle-label">Auto-Join Classes</span>
        <span class="toggle-desc">Automatically join when class starts</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="autoJoinToggle">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Check Interval -->
    <div class="toggle-section">
      <div class="toggle-info">
        <span class="toggle-label">Check Interval</span>
        <span class="toggle-desc">How often to check for classes</span>
      </div>
      <select id="checkInterval" class="interval-select">
        <option value="1">1 min</option>
        <option value="2" selected>2 min</option>
        <option value="5">5 min</option>
      </select>
    </div>

    <!-- Next Class Info -->
    <div class="next-class-card" id="nextClassCard" style="display: none;">
      <div class="next-class-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Next Class</span>
      </div>
      <div class="next-class-name" id="nextClassName">—</div>
      <div class="next-class-time" id="nextClassTime">—</div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn btn-primary" id="saveBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Save Credentials
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear All
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>⚡ Credentials stored locally · Never leaves your device</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
